name: Deploy SKY TO BE MEDIA to OVH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 1. Préparer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 2. Installer, Vérifier (Audit/Lint) et Construire
        run: |
          npm install
          npm audit --audit-level=high
          npm run lint --if-present
          npm run build

      - name: 3. Configurer Nginx et SSL (premier déploiement uniquement)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            DOMAIN="skytobemedia.com"
            sudo mkdir -p /var/www/$DOMAIN

            if [ ! -d /etc/letsencrypt/live/$DOMAIN ]; then
              sudo tee /etc/nginx/sites-available/$DOMAIN > /dev/null <<'NGINXEOF'
            server {
                server_name skytobemedia.com www.skytobemedia.com;
                limit_req zone=mylimit burst=20 nodelay;
                include conf.d/security-headers.conf;

                root /var/www/skytobemedia.com;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                }

                listen 80;
                listen [::]:80;
            }
            NGINXEOF
              sudo ln -sf /etc/nginx/sites-available/$DOMAIN /etc/nginx/sites-enabled/$DOMAIN
              sudo certbot --nginx -d $DOMAIN -d www.$DOMAIN \
                --non-interactive --agree-tos -m ${{ secrets.CERTBOT_EMAIL }}
            else
              if [ ! -L /etc/nginx/sites-enabled/$DOMAIN ]; then
                sudo ln -s /etc/nginx/sites-available/$DOMAIN /etc/nginx/sites-enabled/$DOMAIN
              fi
            fi

            sudo nginx -t && sudo systemctl reload nginx

      - name: 4. Préparer le dossier sur le serveur
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R ubuntu:ubuntu /var/www/skytobemedia.com
            sudo rm -rf /var/www/skytobemedia.com/*

      - name: 5. Envoyer les fichiers prêts au serveur
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist"
          target: "/var/www/skytobemedia.com/"
          strip_components: 1

      - name: 6. Sécuriser les droits et recharger Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R www-data:www-data /var/www/skytobemedia.com/
            sudo nginx -t && sudo systemctl reload nginx
